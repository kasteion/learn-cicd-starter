name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Build
        run: scripts/buildprod.sh

      - name: GCP Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build and push
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-497218/notely-ar-repo/notely:latest .

      - name: Deploy to Cloud run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-497218/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-497218 --max-instances=4
